# only top level substitutions can be overridden on the esphome command line.
# command line substitution values will always be typed as strings
# even though the same values parsed from yaml would be typed otherwise.
substitutions:
  update_interval: 60

  rotation: 0

  barometric_pressure_psi: 14.696
  barometric_pressure_mbar: ${pressure.mbar.per_psi * (barometric_pressure_psi | float)}

  pressure_raw_psi_0: 1000
  pressure_raw_psi_100: 15000

  pressure_unit: psi

  pressure_psi_precision: 4
  pressure_psi_minimum: 0
  pressure_psi_maximum: 100
  pressure_psi_threshold: 80

  pressure_mbar_precision: 1
  pressure_mbar_minimum: 0
  pressure_mbar_maximum: 7000
  pressure_mbar_threshold: 5500

  pressure_precision: ${pressure[pressure.unit].precision}
  pressure_minimum: ${pressure[pressure.unit].minimum}
  pressure_maximum: ${pressure[pressure.unit].maximum}
  pressure_threshold: ${pressure[pressure.unit].threshold}
  pressure_label_text: ${pressure[pressure.unit].label_text}

  pressure_format: "%.${pressure_precision}f"

  pressure_unit_on_value:
    - if:
        condition:
          lambda: return x < ${pressure_threshold};
        then:
          - logger.log:
              level: INFO
              format: "${name} pressure ${pressure_format} ${pressure.unit} < ${pressure_threshold}"
              args: [x]
          - binary_sensor.template.publish:
              id: ${pressure.threshold_alarm}
              state: OFF
        else:
          - logger.log:
              level: WARN
              format: "${name} pressure ${pressure_format} ${pressure.unit} >= ${pressure_threshold}"
              args: [x]
          - binary_sensor.template.publish:
              id: ${pressure.threshold_alarm}
              state: ON
    - lvgl.indicator.update:
        id: pressure_indicator_
        value: !lambda return x * ${math.pow(10, pressure_precision)};
    - lvgl.widget.show: pressure_meter_
    - component.update: ${pressure_label_text}

  barometric_pressure_state: id(barometric_pressure_${pressure.unit}_).state
  pressure_state: id(pressure_${pressure.unit}_).state

  temperature_unit: fahrenheit

  temperature_fahrenheit_precision: 1
  temperature_fahrenheit_minimum: 0
  temperature_fahrenheit_maximum: 120

  temperature_celsius_precision: 1
  temperature_celsius_minimum: -20
  temperature_celsius_maximum: 50

  temperature_precision: ${temperature[temperature.unit].precision}
  temperature_minimum: ${temperature[temperature.unit].minimum}
  temperature_maximum: ${temperature[temperature.unit].maximum}

  temperature_format: "%.${temperature_precision}f"

  temperature_unit_on_value:
    - lvgl.indicator.update:
        id: temperature_indicator_
        value: !lambda return x * ${math.pow(10, ${temperature_precision})};
    - lvgl.widget.show: temperature_meter_
    - lvgl.label.update:
        id: temperature_label_
        text: !lambda return str_sprintf("${temperature_format}", x);

  molar_density_precision: 1
  molar_density_minimum: 0
  molar_density_maximum: 400

  barometric_pressure:
    measurement_alarm: barometric_pressure_measurement_alarm_
    psi: ${(barometric_pressure_psi | float)}
    mbar: ${(barometric_pressure_mbar | float)}

  pressure:
    measurement_alarm: pressure_measurement_alarm_
    threshold_alarm: pressure_threshold_alarm_
    raw:
      psi_0: ${(pressure_raw_psi_0 | int)}
      psi_100: ${(pressure_raw_psi_100 | int)}
    unit: ${pressure_unit}
    psi:
      precision: ${(pressure_psi_precision | int)}
      minimum: ${(pressure_psi_minimum | int)}
      maximum: ${(pressure_psi_maximum | int)}
      threshold: ${(pressure_psi_threshold | int)}
      label_text: pressure_psi_label_text_
    mbar:
      precision: ${(pressure_mbar_precision | int)}
      minimum: ${(pressure_mbar_minimum | int)}
      maximum: ${(pressure_mbar_maximum | int)}
      threshold: ${(pressure_mbar_threshold | int)}
      label_text: pressure_bar_label_text_
      per_psi: 68.94757
  temperature:
    unit: ${temperature_unit}
    fahrenheit:
      precision: ${(temperature_fahrenheit_precision | int)}
      minimum: ${(temperature_fahrenheit_minimum | int)}
      maximum: ${(temperature_fahrenheit_maximum | int)}
    celsius:
      precision: ${(temperature_celsius_precision | int)}
      minimum: ${(temperature_celsius_minimum | int)}
      maximum: ${(temperature_celsius_maximum | int)}
  molar_density:
    precision: ${(molar_density_precision | int)}
    minimum: ${(molar_density_minimum | int)}
    maximum: ${(molar_density_maximum | int)}
    format: "%.${molar_density_precision}f"
  
  apms_smtp: !include apms_smtp.yaml
  smtp: true

  apms_debug: !include apms_debug.yaml
  debug: false
  
external_components:
  - source:
      type: local
      path: ../components
    components: [composition_, qmp6988]

packages:
  - ${apms_smtp if smtp in [true, 'true'] else {}}
  - ${apms_debug if debug in [true, 'true'] else {}}
  - !include ${name}_.yaml

ota:
  - id: ota_
    platform: esphome
    password: !secret ota-password

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api-encryption-key

web_server:
  version: 3

globals:
  - id: button_held_
    type: bool
    initial_value: "false"
  - id: light_brightness_target_
    type: float
    initial_value: "1.0f"
    restore_value: yes

esphome:
  name: ${name}
  on_boot:
    - script.execute: pressure_measurement_watchdog_
    - script.execute: barometric_pressure_measurement_watchdog_

esp32:
  cpu_frequency: 80Mhz
  framework:
    sdkconfig_options:
      CONFIG_PARTITION_TABLE_OFFSET: "0xf000"
      CONFIG_SECURE_FLASH_ENC_ENABLED: "y"
      CONFIG_SECURE_FLASH_ENCRYPTION_AES256: "y"
      CONFIG_NVS_ENCRYPTION: "n"
      CONFIG_NVS_SEC_KEY_PROTECT_USING_FLASH_ENC: "n"
  partitions: partitions.csv

i2c:
  - id: !extend ${i2c}
    # replace internal pullups with external 4.7k pullups per TE M3200 datasheet
    # m5stack unit env iii (with qmp6988) has 4.7k pullups already
    scl_pullup_enabled: false
    sda_pullup_enabled: false

light:
  # a completed turn_on action to brightness 0 will turn the light off but with brightness 1
  - id: !extend ${light}
    restore_mode: RESTORE_DEFAULT_ON

display:
  - id: !extend ${display}
    auto_clear_enabled: false
    update_interval: never

interval:
  - interval: ${update_interval}s
    then:
      - lambda: id(molar_density_).consume(); // any stale values
      - component.update: tem3200_
      - delay: 1ms # yield
      - component.update: qmp6988_
      - if:
          condition:
            binary_sensor.is_on: ${barometric_pressure.measurement_alarm}
          then:
            lambda: id(molar_density_).curry(id(barometric_pressure_), ${barometric_pressure.mbar});

script:
  - id: pressure_measurement_watchdog_
    mode: restart
    then:
      - delay: ${update_interval + 10}s
      - logger.log:
          level: ERROR
          format: "${name} pressure measurement failure (was ${pressure_format} ${pressure.unit})"
          args: ["${pressure_state}"]
      - binary_sensor.template.publish:
          id: ${pressure.measurement_alarm}
          state: ON
      - lvgl.widget.hide: pressure_meter_
      - lvgl.widget.hide: temperature_meter_
      - lvgl.widget.hide: molar_density_meter_

  - id: barometric_pressure_measurement_watchdog_
    mode: restart
    then:
      - delay: ${update_interval + 10}s
      - logger.log:
          level: ERROR
          format: "${name} barometric pressure measurement failure (was ${pressure_format} ${pressure.unit})"
          args: ["${barometric_pressure_state}"]
      - binary_sensor.template.publish:
          id: ${barometric_pressure.measurement_alarm}
          state: ON
      - lambda: id(molar_density_).curry(id(barometric_pressure_), ${barometric_pressure.mbar});

text_sensor:
  - id: pressure_psi_label_text_
    platform: template
    internal: true
    update_interval: never
    lambda: return str_sprintf("${pressure_format}", ${pressure_state});
    on_value:
      lvgl.label.update:
        id: pressure_label_
        text: !lambda return x;

  - id: pressure_bar_label_text_
    platform: template
    internal: true
    update_interval: never
    lambda: return str_sprintf("%.${pressure.mbar.precision + 3}f", ${pressure_state} / ${math.pow(10, 3)});
    on_value:
      lvgl.label.update:
        id: pressure_label_
        text: !lambda return x;

binary_sensor:
  - id: !extend ${button}
    on_press:
      - globals.set:
          id: button_held_
          value: "false"
      - delay: 300ms
      - if:
          condition:
            lambda: return id(${button}).state;
          then:
            - globals.set:
                id: button_held_
                value: "true"
            - light.turn_on:
                id: ${light}
                brightness: !lambda return id(light_brightness_target_);
                transition_length: !lambda |-
                  return static_cast<uint32_t>(2000.0f * (
                    std::abs(id(light_brightness_target_) - id(${light}).remote_values.get_brightness())));
    on_release:
      if:
        condition:
          lambda: return !id(button_held_);
        then:
          - if:
              condition:
                light.is_off: ${light}
              then:
                - light.turn_on:
                    id: ${light}
                    transition_length: 0ms
                    brightness: 1.0
                - globals.set:
                    id: light_brightness_target_
                    value: "0.0f"
          - lvgl.page.next:
        else:
          if:
            condition:
              light.is_off: ${light}
            then:
              globals.set:
                id: light_brightness_target_
                value: "1.0f"
            else:
              if:
                condition:
                  lambda: return 1.0f == id(${light}).current_values.get_brightness();
                then:
                  globals.set:
                    id: light_brightness_target_
                    value: "0.0f"
                else:
                  light.turn_on:
                    id: ${light}
                    transition_length: 0ms
                    brightness: !lambda return id(${light}).current_values.get_brightness();

  - id: ${pressure.threshold_alarm}
    name: pressure threshold alarm
    platform: template
    device_class: problem
    trigger_on_initial_state: true

  - id: ${pressure.measurement_alarm}
    name: pressure measurement alarm
    platform: template
    device_class: problem
    trigger_on_initial_state: true

  - id: ${barometric_pressure.measurement_alarm}
    name: barometric pressure measurement alarm
    platform: template
    device_class: problem
    trigger_on_initial_state: true

sensor:
  - id: tem3200_
    platform: tem3200
    i2c_id: ${i2c}
    update_interval: never

    raw_pressure:
      id: pressure_
      internal: true
      on_value:
        - script.execute: pressure_measurement_watchdog_
        - component.update: pressure_psi_
        - component.update: pressure_mbar_
        - binary_sensor.template.publish:
            id: ${pressure.measurement_alarm}
            state: OFF

    temperature:
      id: temperature_
      internal: true
      on_value:
        - component.update: temperature_celsius_
        - component.update: temperature_fahrenheit_

  - id: pressure_psi_
    platform: template
    name: pressure psi
    update_interval: never
    unit_of_measurement: psi
    state_class: measurement
    device_class: pressure
    accuracy_decimals: ${pressure.psi.precision}
    lambda: return id(pressure_).state;
    filters:
      calibrate_linear:
        - ${pressure.raw.psi_0} -> 0
        - ${pressure.raw.psi_100} -> 100
    on_value: ${pressure_unit_on_value if pressure.unit == "psi" else []}

  - id: pressure_mbar_
    platform: template
    name: pressure mbar
    update_interval: never
    unit_of_measurement: mbar
    state_class: measurement
    device_class: pressure
    accuracy_decimals: ${pressure.mbar.precision}
    lambda: return id(pressure_).state;
    filters:
      calibrate_linear:
        - ${pressure.raw.psi_0} -> 0
        - ${pressure.raw.psi_100} -> ${100 * pressure.mbar.per_psi}
    on_value:
      - then: ${pressure_unit_on_value if pressure.unit == "mbar" else []}
      - then:
        - lambda: id(molar_density_).curry(id(pressure_mbar_));

  - id: temperature_celsius_
    platform: template
    name: temperature celsius
    update_interval: never
    unit_of_measurement: °C
    state_class: measurement
    device_class: temperature
    accuracy_decimals: ${temperature.celsius.precision}
    lambda: return id(temperature_).state;
    on_value:
      - then: ${temperature_unit_on_value if temperature.unit == "celsius" else []}
      - then: 
        - lambda: id(molar_density_).curry(id(temperature_celsius_));

  - id: temperature_fahrenheit_
    platform: template
    name: temperature fahrenheit
    update_interval: never
    unit_of_measurement: °F
    state_class: measurement
    device_class: temperature
    accuracy_decimals: ${temperature.fahrenheit.precision}
    lambda: return id(temperature_).state;
    filters:
      calibrate_linear:
        - 0 -> 32
        - 100 -> 212
    on_value: ${temperature_unit_on_value if temperature.unit == "fahrenheit" else []}

  - id: qmp6988_
    platform: qmp6988
    i2c_id: ${i2c}
    update_interval: never
    pressure:
      id: barometric_pressure_
      internal: true
      # unit_of_measurement: hPa
      on_value:
        - script.execute: barometric_pressure_measurement_watchdog_
        - component.update: barometric_pressure_psi_
        - component.update: barometric_pressure_mbar_
        - binary_sensor.template.publish:
            id: ${barometric_pressure.measurement_alarm}
            state: OFF
        - lambda: id(molar_density_).curry(id(barometric_pressure_));

  - id: barometric_pressure_psi_
    platform: template
    name: barometric pressure psi
    update_interval: never
    unit_of_measurement: psi
    state_class: measurement
    device_class: pressure
    accuracy_decimals: ${pressure.psi.precision}
    lambda: return id(barometric_pressure_).state / ${pressure.mbar.per_psi};

  - id: barometric_pressure_mbar_
    platform: template
    name: barometric pressure mbar
    update_interval: never
    unit_of_measurement: mbar
    state_class: measurement
    device_class: pressure
    accuracy_decimals: ${pressure.mbar.precision}
    lambda: return id(barometric_pressure_).state;  // 1 hPa = 1 mbar

  - id: molar_density_
    platform: composition_
    name: molar density
    unit_of_measurement: mol/m³
    state_class: measurement
    device_class: ""
    accuracy_decimals: ${molar_density.precision}
    sensors:
      - pressure_mbar_
      - temperature_celsius_
      - barometric_pressure_
    lambda: |-
      // pV = nRT ⇒ n/V = p/(R·T)
      // p is absolute pressure (gauge + barometric) in Pa (kg/(m·s²), 100 Pa = 1 mbar)
      // V is volume in m³
      // n is moles in mol
      // R is ideal gas constant in kg·m²/(s²·mol·K) (8.31446)
      // T is absolute temperature in kelvin (273.15 K = 0 °C)
      static auto constexpr pascal_per_mbar{100.0f};
      static auto constexpr kelvin_offset_celsius{273.15f};
      static auto constexpr R{8.31446f};
      auto const [gp, t, bp]{id(molar_density_).consume()};
      auto const p{pascal_per_mbar * (*gp + *bp)};
      auto const T{kelvin_offset_celsius + *t};
      return p / (R * T);	// = n / V
    on_value:
      - logger.log:
          level: INFO
          format: "${name} molar_density ${molar_density.format} mol/m³"
          args: [x]
      - lvgl.indicator.update:
          id: molar_density_indicator_
          value: !lambda return x * ${math.pow(10, molar_density.precision)};
      - lvgl.widget.show: molar_density_meter_
      - lvgl.label.update:
          id: molar_density_label_
          text: !lambda return str_sprintf("${molar_density.format}", x);

  - id: sht3xd_
    platform: sht3xd
    i2c_id: ${i2c}
    humidity:
      id: sht3xd_humidity_
      name: humidity

image:
  - id: apms_
    file: apms.png
    type: rgb565
    resize: ${display_size}
  - id: pressure_scale_
    file: scale_${pressure.unit}.png
    type: rgb565
    resize: ${display_size}
    transparency: alpha_channel
  - id: temperature_scale_
    file: scale_${temperature.unit}.png
    type: rgb565
    resize: ${display_size}
    transparency: alpha_channel
  - id: molar_density_scale_
    file: scale_molar_density.png
    type: rgb565
    resize: ${display_size}
    transparency: alpha_channel

lvgl:
  rotation: ${rotation}
  pages:
    - widgets:
        - image:
            src: apms_
            align: CENTER
            on_boot:
              - delay: 4s
              - lvgl.page.next:
    - widgets:
        - container:
            widgets:
              - obj:
                  bg_color: black
                  width: 100%
                  height: 100%
                  border_width: 0
                  radius: 0
              - meter:
                  bg_opa: TRANSP
                  width: 100%
                  height: 100%
                  scales:
                    - range_from: ${pressure_minimum}
                      range_to: ${pressure_maximum}
                      indicators:
                        - arc:
                            color: green
                            width: 8
                            start_value: ${pressure_minimum}
                            end_value: ${pressure_threshold}
                        - arc:
                            color: red
                            width: 8
                            start_value: ${pressure_threshold}
                            end_value: ${pressure_maximum}
              - image:
                  src: pressure_scale_
                  align: CENTER
              - meter:
                  id: pressure_meter_
                  bg_opa: TRANSP
                  width: 100%
                  height: 100%
                  hidden: true
                  scales:
                    - range_from: ${math.pow(10, pressure_precision) * pressure_minimum}
                      range_to: ${math.pow(10, pressure_precision) * pressure_maximum}
                      indicators:
                        - line:
                            id: pressure_indicator_
                            color: red
              - label:
                  id: pressure_label_
                  align: CENTER
                  text_color: white
                  y: 45
                  text: "---"
    - widgets:
        - container:
            widgets:
              - obj:
                  bg_color: black
                  width: 100%
                  height: 100%
                  border_width: 0
                  radius: 0
              - image:
                  src: temperature_scale_
                  align: CENTER
              - meter:
                  id: temperature_meter_
                  bg_opa: TRANSP
                  width: 100%
                  height: 100%
                  hidden: true
                  scales:
                    - range_from: ${math.pow(10, temperature_precision) * temperature_minimum}
                      range_to: ${math.pow(10, temperature_precision) * temperature_maximum}
                      indicators:
                        - line:
                            id: temperature_indicator_
                            color: red
              - label:
                  id: temperature_label_
                  align: CENTER
                  text_color: white
                  y: 45
                  text: "--"
    - widgets:
        - container:
            widgets:
              - obj:
                  bg_color: black
                  width: 100%
                  height: 100%
                  border_width: 0
                  radius: 0
              - image:
                  src: molar_density_scale_
                  align: CENTER
              - meter:
                  id: molar_density_meter_
                  bg_opa: TRANSP
                  width: 100%
                  height: 100%
                  hidden: true
                  scales:
                    - range_from: ${math.pow(10, molar_density.precision) * molar_density.minimum}
                      range_to: ${math.pow(10, molar_density.precision) * molar_density.maximum}
                      indicators:
                        - line:
                            id: molar_density_indicator_
                            color: red
              - label:
                  id: molar_density_label_
                  align: CENTER
                  text_color: white
                  y: 45
                  text: "--"
